
services:
  hermes-ui:
    build: .
    ports:
      - "8000:8000"
    environment:
      - HERMES_AGENT_CMD=hermes
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      # Local LLM provider (Ollama / llama.cpp / LM Studio) runs on the host machine
      # host.docker.internal lets Docker reach host services (configured automatically)
      # Provider is selected through the UI on first launch — no manual config needed
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Mount the host ~/.hermes directory into the container to persist config/sessions
      - ${HOME}/.hermes:/root/.hermes
      # Mount system certificates for secure connections
      - /etc/ssl/certs:/etc/ssl/certs:ro
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - hermes-network

networks:
  hermes-network:
    driver: bridge
